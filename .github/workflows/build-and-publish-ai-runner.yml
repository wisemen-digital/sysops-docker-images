---
name: Build & Publish AI Runner

on:
  pull_request:
    paths: &watch_paths
      - '.github/actions/**'
      - '.github/workflows/build-and-publish-ai-runner.yml'
      - '.github/workflows/internal-build-test-and-publish.yml'
      - 'ai-runner/**'
  push:
    branches:
      - main
    paths: *watch_paths
  schedule:
    - cron: "0 0 1,15 * *"  # Every 2 weeks
  workflow_dispatch:

jobs:
  build-test-and-publish:
    uses: ./.github/workflows/internal-build-test-and-publish.yml
    strategy:
      matrix:
        version:
          - name: latest
    with:
      image: ai-runner
      version: ${{ matrix.version.name }}
      run-tests: false
      build-args: |
        CODEX_VERSION=latest
        CLAUDE_CODE_VERSION=latest
        PNPM_VERSION=10.23.0
